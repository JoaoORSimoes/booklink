<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Registo de Utilizador</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/theme.css">
</head>
<body class="d-flex justify-content-center align-items-center vh-100">

<div class="card p-4" style="width: 420px;">
  <h3 class="text-center mb-3">📝 Registar Utilizador</h3>

  <input id="regName" class="form-control mb-2" placeholder="Nome">
  <input id="regEmail" class="form-control mb-2" placeholder="Email">
  <input id="regPassword" type="password" class="form-control mb-2" placeholder="Password">

  <select id="regRole" class="form-control mb-3">
    <option value="student">Student</option>
    <option value="staff">Staff</option>
    <option value="teacher">Teacher</option>
  </select>

  <button class="btn btn-primary w-100" onclick="registerUser()">Registar</button>

  <div class="mt-3 text-center small text-muted" id="regMsg"></div>
</div>

<script src="js/app.js"></script>
</body>
</html>
